                <button class="transport grid h-10 w-10 place-items-center rounded-full bg-white/90 text-lg font-black leading-none text-green-dark shadow-[0_3px_0_rgba(0,0,0,0.16)] transition hover:-translate-y-0.5 disabled:cursor-not-allowed disabled:opacity-40 disabled:shadow-none" type="button" data-next disabled aria-label="次の歌" title="次の歌">
                  <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true"><path d="M18 5v14" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/><path d="M5 6l9 6-9 6V6Z" fill="currentColor"/></svg>
                </button>
              </div>
            </div>
          </div>

          <div class="rounded-lg border-2 border-green/20 bg-white/85 p-4" data-poem-display hidden>
            <div class="mb-2 flex flex-wrap items-center gap-2">
              <span class="rounded-full bg-pink px-3 py-1 text-xs font-black text-white" data-poem-num>1番</span>
              <span class="rounded-full border-2 border-green bg-white px-3 py-1 text-xs font-black text-green-dark" data-poem-author>天智天皇</span>
            </div>
            <div class="kimari-tag"><span>決まり字</span><strong data-poem-kimari>あきの</strong></div>
            <div class="poem-line poem-kami my-1 px-1 text-[1.08rem] font-black leading-8 sm:text-xl" data-poem-kami>あきのたの かりほのいおの とまをあらみ</div>
            <div class="mb-2 px-1 text-xs font-bold leading-5 text-muted sm:text-sm" data-poem-kami-kanji>秋の田の かりほの庵の 苫をあらみ</div>
            <div class="poem-line poem-shimo my-1 px-1 text-[1.08rem] font-black leading-8 sm:text-xl" data-poem-shimo>わがころもでは つゆにぬれつつ</div>
            <div class="mb-2 px-1 text-xs font-bold leading-5 text-muted sm:text-sm" data-poem-shimo-kanji>わが衣手は 露にぬれつつ</div>
            <div class="mt-3 h-1.5 overflow-hidden rounded-full bg-green/15"><div class="h-full w-0 rounded-full bg-green transition-[width] duration-300" data-progress-bar></div></div>
            <div class="mt-1 text-right text-xs font-extrabold text-muted" data-progress-label>1 / 25 首</div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script src="poems.js"></script>
  <script>
    const setDetails = {
      1: {
        name: "決まり字かるた１",
        leaves: 1,
        leafText: "１",
        poems: [18, 57, 77, 65, 74, 23, 13, 40, 37, 66, 100, 46, 71, 33, 35, 99, 17, 42, 75, 89, 16, 34, 73, 55, 4]
      },
      2: {
        name: "決まり字かるた２",
        leaves: 2,
        leafText: "２",
        poems: [70, 87, 62, 85, 93, 83, 90, 14, 94, 49, 27, 5, 26, 82, 72, 60, 95, 44, 20, 38, 54, 8, 92, 11, 76]
      },
      3: {
        name: "決まり字かるた３",
        leaves: 3,
        leafText: "３",
        poems: [91, 15, 50, 2, 67, 9, 96, 47, 59, 32, 28, 41, 97, 24, 10, 29, 68, 36, 80, 84, 53, 86, 25, 88, 19]
      },
      4: {
        name: "決まり字かるた４",
        leaves: 4,
        leafText: "４",
        poems: [22, 81, 61, 21, 63, 6, 51, 98, 48, 43, 3, 52, 39, 31, 64, 79, 1, 12, 7, 56, 69, 30, 58, 78, 45]
      }
    };

    const buttons      = [...document.querySelectorAll("[data-set]")];
    const setPicker    = document.querySelector("[data-set-picker]");
    const nameTargets  = [...document.querySelectorAll("[data-selected-name]")];
    const playerTitle  = document.querySelector("[data-player-title]");
    const playerCopy   = document.querySelector("[data-player-copy]");
    const playButton   = document.querySelector("[data-play]");
    const prevButton   = document.querySelector("[data-prev]");
    const nextButton   = document.querySelector("[data-next]");
    const display      = document.querySelector("[data-poem-display]");
    const elNum        = document.querySelector("[data-poem-num]");
    const elAuthor     = document.querySelector("[data-poem-author]");
    const elKimari     = document.querySelector("[data-poem-kimari]");
    const elKami       = document.querySelector("[data-poem-kami]");
    const elKamiKanji  = document.querySelector("[data-poem-kami-kanji]");
    const elShimo      = document.querySelector("[data-poem-shimo]");
    const elShimoKanji = document.querySelector("[data-poem-shimo-kanji]");
    const progressBar  = document.querySelector("[data-progress-bar]");
    const progressLbl  = document.querySelector("[data-progress-label]");
    const youtubeLink  = document.querySelector("[data-youtube-link]");
    const playIcon = '<svg width="24" height="24" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5.5v13l10-6.5-10-6.5Z" fill="currentColor"/></svg>';
    const pauseIcon = '<svg width="24" height="24" viewBox="0 0 24 24" aria-hidden="true"><rect x="7" y="5" width="3.8" height="14" rx="1.2" fill="currentColor"/><rect x="13.2" y="5" width="3.8" height="14" rx="1.2" fill="currentColor"/></svg>';

    let selectedSet = "1";
    try { selectedSet = window.localStorage.getItem("kimarijiSelectedSet") || "1"; } catch(_) {}
    let queue = [];
    let cursor = -1;
    let isPlaying = false;
    let isPaused = false;
    let started = false;
    let completed = false;
    let audioRun = 0;
    let betweenTimer = null;
    let cancelBetween = null;
    let resumeBetween = null;
    let resolveClip = null;
    const audio = new Audio();
    audio.preload = "auto";

    function buildQueue() {
      const d = setDetails[selectedSet];
      queue = d.poems
        .map((poemNumber) => POEMS.find((poem) => poem.n === poemNumber))
        .filter(Boolean);
      // Fisher-Yatesシャッフルでランダム順にする
      for (let i = queue.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [queue[i], queue[j]] = [queue[j], queue[i]];
      }
    }

    function setTransportState() {
      const hasCurrent = started && cursor >= 0;
      playButton.disabled = false;
      playButton.innerHTML = isPlaying ? pauseIcon : playIcon;
      playButton.setAttribute("aria-label", isPlaying ? "一時停止" : isPaused ? "再開" : completed ? "最初から再生" : hasCurrent ? "もう一度再生" : "再生");
      playButton.title = isPlaying ? "一時停止" : isPaused ? "再開" : completed ? "最初から再生" : hasCurrent ? "もう一度再生" : "再生";
      prevButton.disabled = !hasCurrent || cursor <= 0;
      nextButton.disabled = !hasCurrent || completed || cursor >= queue.length - 1;
    }

    function setUIIdle(message) {
      isPlaying = false;
      isPaused = false;
      setTransportState();
      if (message) playerCopy.textContent = message;
    }

    function setUIPlaying(message) {
      isPlaying = true;
      isPaused = false;
      setTransportState();
      if (message) playerCopy.textContent = message;
    }

    function setUIPaused(message) {
      isPlaying = false;
      isPaused = false;
      setTransportState();
      if (message) playerCopy.textContent = message;
    }

    function renderPoem(p, idx) {
      display.hidden = false;
      elNum.textContent = `${p.n}番`;
      elAuthor.textContent = p.au;
      elKimari.textContent = p.ki;
      elKami.textContent = p.k2;
      elKamiKanji.textContent = p.k1;
      elShimo.textContent = p.s2;
      elShimoKanji.textContent = p.s1;
      const total = queue.length;
      const cur = idx + 1;
      progressBar.style.width = `${(cur / total) * 100}%`;
      progressLbl.textContent = `${cur} / ${total} 首`;
      playerCopy.textContent = `${setDetails[selectedSet].name} ${cur}/${total}首・${p.n}番`;
    }

    function audioPath(poemNumber, part) {
      return `yomi/I-${String(poemNumber).padStart(3, "0")}${part}.wav`;
    }

    function resetLineFill(line) {
      line.classList.remove("reading");
      line.style.setProperty("--fill", "0%");
    }

    function resetAllLineFill() {
      resetLineFill(elKami);
      resetLineFill(elShimo);
    }

    function stopCurrentAudio() {
      audioRun++;
      clearTimeout(betweenTimer);
      if (cancelBetween) cancelBetween();
      if (resumeBetween) {
        const resume = resumeBetween;
        resumeBetween = null;
        resume(false);
      }
      if (resolveClip) {
        const resolve = resolveClip;
        resolveClip = null;
        resolve(false);
      }
      audio.pause();
      audio.onended = null;
      audio.onerror = null;
      audio.ontimeupdate = null;
      audio.removeAttribute("src");
      audio.load();
      resetAllLineFill();
      isPlaying = false;
      isPaused = false;
    }

    function waitBetween(runId, ms) {
      return new Promise((resolve) => {
        let settled = false;
        function finish(value) {
          if (settled) return;
          settled = true;
          cancelBetween = null;
          resumeBetween = null;
          resolve(value && runId === audioRun);
        }
        cancelBetween = () => {
          finish(false);
        };
        resumeBetween = (value = true) => {
          finish(value);
        };
        betweenTimer = setTimeout(() => {
          finish(true);
        }, ms);
      });
    }

    function playClip(src, runId, line) {
      return new Promise((resolve, reject) => {
        let settled = false;

        function finish(value) {
          if (settled) return;
          settled = true;
          resolveClip = null;
          resolve(value);
        }

        function fail(error) {
          if (settled) return;
          settled = true;
          resolveClip = null;
          reject(error);
        }

        resetAllLineFill();
        line.classList.add("reading");
        line.style.setProperty("--fill", "0%");
        resolveClip = finish;
        audio.onended = () => {
          line.style.setProperty("--fill", "100%");
          finish(runId === audioRun);
        };
        audio.onerror = () => fail(new Error(`audio error: ${src}`));
        audio.ontimeupdate = () => {
          if (!Number.isFinite(audio.duration) || audio.duration <= 0) return;
          const fill = Math.min(100, Math.max(0, (audio.currentTime / audio.duration) * 100));
          line.style.setProperty("--fill", `${fill}%`);
        };
        audio.src = src;
        audio.currentTime = 0;
        const playPromise = audio.play();
        if (playPromise?.catch) {
          playPromise.catch(fail);
        }
      });
    }

    async function playPoemAudio(p, onDone) {
      stopCurrentAudio();
      const runId = ++audioRun;
      completed = false;
      setUIPlaying(`${setDetails[selectedSet].name} ${cursor + 1}/${queue.length}首・${p.n}番を再生中`);

      try {
        const upperCompleted = await playClip(audioPath(p.n, "A"), runId, elKami);
        if (!upperCompleted) return;

        const gapCompleted = await waitBetween(runId, 220);
        if (!gapCompleted) return;

        const lowerCompleted = await playClip(audioPath(p.n, "B"), runId, elShimo);
        if (!lowerCompleted) return;

        resetAllLineFill();
        isPlaying = false;
        isPaused = false;
        if (onDone) onDone();
      } catch (error) {
        if (runId !== audioRun) return;
        resetAllLineFill();
        isPlaying = false;
        isPaused = false;
        setUIIdle("音声ファイルを再生できませんでした。yomi フォルダの録音ファイルを確認してください。");
      }
    }

    function pauseReading() {
      if (!isPlaying) return;
      clearTimeout(betweenTimer);
      if (!resumeBetween) audio.pause();
      isPlaying = false;
      isPaused = true;
      playerCopy.textContent = `${setDetails[selectedSet].name} ${cursor + 1}/${queue.length}首・一時停止中`;
      setTransportState();
    }

    function resumeReading() {
      if (!isPaused) return;
      isPlaying = true;
      isPaused = false;
      setTransportState();
      playerCopy.textContent = `${setDetails[selectedSet].name} ${cursor + 1}/${queue.length}首・再生中`;
      if (resumeBetween) {
        const resume = resumeBetween;
        resumeBetween = null;
        resume(true);
        return;
      }
      const playPromise = audio.play();
      if (playPromise?.catch) {
        playPromise.catch(() => {
          isPlaying = false;
          isPaused = true;
          setTransportState();
        });
      }
    }

    function startReading() {
      buildQueue();
      cursor = 0;
      started = true;
      completed = false;
      const p = queue[cursor];
      renderPoem(p, cursor);
      playPoemAudio(p, () => {
        if (cursor >= queue.length - 1) {
          finishSet();
        } else {
          setUIPaused(`${setDetails[selectedSet].name} ${cursor + 1}/${queue.length}首・次へ進めます。`);
        }
      });
    }

    function nextPoem() {
      if (cursor >= queue.length - 1) return;
      cursor++;
      started = true;
      completed = false;
      const p = queue[cursor];
      renderPoem(p, cursor);
      playPoemAudio(p, () => {
        if (cursor >= queue.length - 1) {
          finishSet();
        } else {
          setUIPaused(`${setDetails[selectedSet].name} ${cursor + 1}/${queue.length}首・次へ進めます。`);
        }
      });
    }

    function previousPoem() {
      if (cursor <= 0) return;
      cursor--;
      started = true;
      completed = false;
      const p = queue[cursor];
      renderPoem(p, cursor);
      playPoemAudio(p, () => {
        setUIPaused(`${setDetails[selectedSet].name} ${cursor + 1}/${queue.length}首・次へ進めます。`);
      });
    }

    function replayCurrent() {
      if (!started || completed) {
        startReading();
        return;
      }
      const p = queue[cursor];
      playPoemAudio(p, () => {
        if (cursor >= queue.length - 1) finishSet();
        else setUIPaused();
      });
    }

    function finishSet() {
      completed = true;
      isPlaying = false;
      setTransportState();
      playerCopy.textContent = `${setDetails[selectedSet].name}（${queue.length}首）を最後まで読み終わりました。`;
    }

    function stopSpeech({ keepDisplay = true } = {}) {
      const hadCurrent = cursor >= 0 && display.hidden === false;
      stopCurrentAudio();
      isPlaying = false;
      isPaused = false;
      completed = false;
      resetAllLineFill();
      if (keepDisplay && hadCurrent) {
        started = true;
        display.hidden = false;
        playerCopy.textContent = `${setDetails[selectedSet].name} ${cursor + 1}/${queue.length}首・停止中`;
      } else {
        started = false;
        cursor = -1;
        display.hidden = true;
        playerCopy.textContent = `${setDetails[selectedSet].name}は再生ボタンで１首めから始まります。`;
      }
      setTransportState();
    }

    function updateSet(setNumber) {
      selectedSet = setDetails[setNumber] ? String(setNumber) : "1";
      const detail = setDetails[selectedSet];

      buttons.forEach((b) => {
        b.setAttribute("aria-pressed", String(b.dataset.set === selectedSet));
      });
      nameTargets.forEach((t) => { t.textContent = detail.name; });

      playerTitle.textContent = `${detail.name}を再生`;
      playerCopy.textContent = `公式セット分けに合わせた25首を、ランダムな順番で読み上げます。`;
      if (setPicker) setPicker.open = false;

      try { window.localStorage.setItem("kimarijiSelectedSet", selectedSet); } catch(_) {}

      if (started || isPlaying || display.hidden === false) {
        stopSpeech({ keepDisplay: false });
      } else {
        setTransportState();
      }
    }

    buttons.forEach((b) => b.addEventListener("click", () => updateSet(b.dataset.set)));
    playButton.addEventListener("click", () => {
      if (isPlaying) {
        pauseReading();
      } else if (isPaused) {
        resumeReading();
      } else if (!started || cursor < 0 || completed) {
        startReading();
      } else {
        replayCurrent();
      }
    });
    prevButton.addEventListener("click", previousPoem);
    nextButton.addEventListener("click", nextPoem);
    youtubeLink?.addEventListener("click", (event) => {
      event.preventDefault();
      window.location.href = youtubeLink.href;
    });
    window.addEventListener("pagehide", stopCurrentAudio);

    updateSet(selectedSet);
  </script>
</body>
</html>
